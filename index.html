<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Privát Jegyzet">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <title>Privát Jegyzetek</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f2f2f7; margin: 0; padding: 20px; padding-top: 60px; display: flex; flex-direction: column; align-items: center; }
        
        /* Login Screen (Jelszó ablak) */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f2f2f7; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 350px;
        }
        #pass-input { width: 80%; text-align: center; letter-spacing: 5px; font-size: 24px; margin-bottom: 20px; padding: 10px; border: 1px solid #d1d1d6; border-radius: 10px; }

        /* Jegyzet felület */
        .input-area { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        textarea { width: 100%; border: none; font-size: 18px; outline: none; resize: none; min-height: 100px; font-family: inherit; }
        
        .button-group { width: 100%; max-width: 530px; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        button { border: none; padding: 15px; border-radius: 15px; font-size: 14px; font-weight: 600; cursor: pointer; color: white; transition: opacity 0.2s; }
        .btn-save { background-color: #007AFF; }
        .btn-export { background-color: #34C759; }
        .btn-import { background-color: #5856D6; }
        button:active { opacity: 0.7; }
        
        #jegyzet-lista { width: 100%; max-width: 530px; display: flex; flex-direction: column; gap: 10px; }
        .jegyzet-kartya { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .torles-btn { color: #ff3b30; font-size: 12px; font-weight: bold; margin-top: 10px; text-align: right; cursor: pointer; }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 id="login-title">🔒 Zárolva</h2>
            <p id="login-msg">Add meg a biztonsági kódot:</p>
            <input type="password" id="pass-input" inputmode="numeric" placeholder="****">
            <button class="btn-save" style="width:100%" py-click="ellenorzes">FELOLDÁS</button>
        </div>
    </div>

    <div class="input-area">
        <textarea id="uj-jegyzet" placeholder="Írj ide valami titkosat..."></textarea>
    </div>
    
    <div class="button-group">
        <button class="btn-save" py-click="mentes">MENTÉS</button>
        <button class="btn-export" py-click="export_adat">EXPORT</button>
        <button class="btn-import" onclick="document.getElementById('file-input').click()">IMPORT</button>
    </div>

    <input type="file" id="file-input" accept=".json">
    <div id="jegyzet-lista"></div>

    <script type="py" src="./main.py" config="./pyscript.json"></script>

</body>
</html>
